<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Pedágio Inteligente</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#121212;
      color:white;
      padding:30px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      flex-wrap:wrap;
      gap:20px;
    }

    .title h1{
      color:#FFD000;
      font-size:36px;
    }

    .title p{
      color:#999;
      margin-top:5px;
    }

    .clock{
      color:#FFD000;
      font-size:22px;
      font-weight:bold;
    }

    .dashboard{
      display:grid;
      grid-template-columns:
      repeat(auto-fit, minmax(250px,1fr));

      gap:20px;

      margin-bottom:25px;
    }

    .card{
      background:#1f1f1f;
      border-radius:18px;
      padding:25px;
      border:1px solid #2a2a2a;
      transition:0.3s;
      position:relative;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-4px);
      border-color:#FFD000;
      box-shadow:0 0 20px rgba(255,208,0,0.2);
    }

    .card::before{
      content:'';
      position:absolute;
      left:0;
      top:0;
      width:5px;
      height:100%;
      background:#FFD000;
    }

    .card-title{
      color:#999;
      text-transform:uppercase;
      font-size:14px;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    .card-value{
      color:#FFD000;
      font-size:40px;
      font-weight:bold;
    }

    .status-section{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:25px;
    }

    .status-card{
      background:#1f1f1f;
      border-radius:18px;
      padding:25px;
      border:1px solid #2a2a2a;
    }

    .status-title{
      color:#999;
      margin-bottom:15px;
      text-transform:uppercase;
      font-size:14px;
    }

    .gate-status{
      font-size:42px;
      font-weight:bold;
    }

    .open{
      color:#00ff88;
      animation:pulse 1s infinite;
    }

    .closed{
      color:#ff4d4d;
    }

    @keyframes pulse{

      0%{
        opacity:1;
      }

      50%{
        opacity:0.5;
      }

      100%{
        opacity:1;
      }

    }

    .flow-bar{
      width:100%;
      height:25px;
      background:#333;
      border-radius:20px;
      overflow:hidden;
      margin-top:15px;
    }

    .flow-fill{
      height:100%;
      width:0%;
      background:#FFD000;
      transition:0.5s;
    }

    .table-container{
      background:#1f1f1f;
      border-radius:18px;
      padding:25px;
      border:1px solid #2a2a2a;
    }

    .table-title{
      color:#FFD000;
      font-size:24px;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      text-align:left;
      color:#FFD000;
      padding-bottom:15px;
      border-bottom:1px solid #333;
    }

    td{
      padding:15px 0;
      border-bottom:1px solid #2a2a2a;
    }

    .approved{
      color:#00ff88;
      font-weight:bold;
    }

    .denied{
      color:#ff4d4d;
      font-weight:bold;
    }

    @media(max-width:900px){

      .status-section{
        grid-template-columns:1fr;
      }

    }

  </style>

</head>

<body>

  <div class="header">

    <div class="title">

      <h1>Pedágio inteligente</h1>

      <p>
        Monitoramento Inteligente em Tempo Real
      </p>

    </div>

    <div
      class="clock"
      id="clock"
    >
      00:00:00
    </div>

  </div>

  <div class="dashboard">

    <div class="card">

      <div class="card-title">
        Valor arrecadado
      </div>

      <div
        class="card-value"
        id="totalValue"
      >
        R$ 0
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        Carros liberados
      </div>

      <div
        class="card-value"
        id="approvedCars"
      >
        0
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        Pagamentos negados
      </div>

      <div
        class="card-value"
        id="deniedCars"
      >
        0
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        Tempo médio
      </div>

      <div
        class="card-value"
        id="avgTime"
      >
        0s
      </div>

    </div>

  </div>

  <div class="status-section">

    <div class="status-card">

      <div class="status-title">
        Status da Cancela
      </div>

      <div
        class="gate-status closed"
        id="gateStatus"
      >
        ● FECHADA
      </div>

    </div>

    <div class="status-card">

      <div class="status-title">
        Fluxo de Veículos
      </div>

      <h2 id="flowText">
        Fluxo Moderado
      </h2>

      <div class="flow-bar">

        <div
          class="flow-fill"
          id="flowFill"
        ></div>

      </div>

    </div>

  </div>

  <div class="table-container">

    <div class="table-title">
      Últimas Passagens
    </div>

    <table>

      <thead>

        <tr>
          <th>Placa do carro</th>
          <th>Status</th>
          <th>Tempo</th>
        </tr>

      </thead>

      <tbody id="historyTable">

      </tbody>

    </table>

  </div>

  <script>

    // ==========================
    // RELÓGIO
    // ==========================

    function updateClock(){

      const now =
      new Date();

      document.getElementById(
        "clock"
      ).innerHTML =
      now.toLocaleTimeString();

    }

    setInterval(updateClock,1000);

    updateClock();

    // ==========================
    // BUSCAR DADOS DO ESP32
    // ==========================

    async function fetchData(){

      try{

        /*
          TROCAR PELO IP DO ESP32
        */

        const response =
        await fetch(
          "http://192.168.0.170/dados"
        );

        const data =
        await response.json();

        updateDashboard(data);

      }catch(error){

        console.log(
          "Erro:",
          error
        );

      }

    }

    // ==========================
    // ATUALIZAR DASHBOARD
    // ==========================

    function updateDashboard(data){

      document.getElementById(
        "totalValue"
      ).innerHTML =
      `R$ ${data.valorTotal.toFixed(2)}`;

      document.getElementById(
        "approvedCars"
      ).innerHTML =
      data.approvedCars;

      document.getElementById(
        "deniedCars"
      ).innerHTML =
      data.deniedCars;

      document.getElementById(
        "avgTime"
      ).innerHTML =
      `${data.avgTime.toFixed(1)}s`;

      const gate =
      document.getElementById(
        "gateStatus"
      );

      if(data.gateOpen){

        gate.innerHTML =
        "● ABERTA";

        gate.className =
        "gate-status open";

      }else{

        gate.innerHTML =
        "● FECHADA";

        gate.className =
        "gate-status closed";

      }

      // ==========================
      // FLUXO
      // ==========================

      document.getElementById(
        "flowFill"
      ).style.width =
      `${data.flow}%`;

      if(data.flow < 2){

        document.getElementById(
          "flowText"
        ).innerHTML =
        "Fluxo Baixo";

      }

      else if(data.flow < 4){

        document.getElementById(
          "flowText"
        ).innerHTML =
        "Fluxo Moderado";

      }

      else{

        document.getElementById(
          "flowText"
        ).innerHTML =
        "Fluxo Alto";

      }

      // ==========================
      // HISTÓRICO
      // ==========================

      document.getElementById(
        "historyTable"
      ).innerHTML =
      data.history;

    }

    // ==========================
    // ATUALIZAÇÃO AUTOMÁTICA
    // ==========================

    fetchData();

    setInterval(
      fetchData,
      2000
    );

  </script>

</body>

</html>
